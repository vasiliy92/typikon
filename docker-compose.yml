name: typikon

networks:
  typikon-net:
    driver: bridge
  proxy:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typikon}
      POSTGRES_USER: ${POSTGRES_USER:-typikon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typikon_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - typikon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typikon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - typikon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: typikon-backend:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-typikon}:${POSTGRES_PASSWORD:-typikon_dev}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-typikon}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-in-production}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SEED_DATA: ${SEED_DATA:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - typikon-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: typikon-frontend:${TAG:-latest}
    restart: unless-stopped
    networks:
      - typikon-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: typikon-nginx:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - typikon-net
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:80/nginx-health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata: