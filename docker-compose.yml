name: typikon

networks:
  typikon-net:
    driver: bridge
  proxy:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typikon}
      POSTGRES_USER: ${POSTGRES_USER:-typikon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typikon_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - typikon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typikon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - typikon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_REGISTRY:-typikon}/typikon-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-typikon}:${POSTGRES_PASSWORD:-typikon_dev}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-typikon}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - typikon-net

  frontend:
    image: ${DOCKER_REGISTRY:-typikon}/typikon-frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
    networks:
      - typikon-net

  nginx:
    image: ${DOCKER_REGISTRY:-typikon}/typikon-nginx:${TAG:-latest}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    networks:
      - typikon-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typikon.rule=Host(`${TRAEFIK_DOMAIN:-typikon.localhost}`)"
      - "traefik.http.routers.typikon.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.typikon.loadbalancer.server.port=80"

volumes:
  pgdata:
