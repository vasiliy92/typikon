upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Nginx-native health check (no backend dependency)
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # Backend API (includes /api/v1/*, /api/docs, /api/openapi.json)
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long assembly operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Backend health check (root-level)
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend — all routes including /
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR websocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Church Slavonic fonts
    location /fonts/ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }
}